services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "5434:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01-init-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: ./.env
        required: true
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    secrets:
      - postgres_password
    volumes:
      - ./secrets:/app-secrets:ro
    command: ["uv", "run", "alembic", "upgrade", "head"]
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/api/tags >/dev/null || wget -qO- http://127.0.0.1:11434/api/tags >/dev/null || ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - path: ./.env
        required: true
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      OLLAMA_OPENAI_BASE_URL: http://ollama:11434/v1
      UPLOAD_ROOT_DIR: /data/uploads
    secrets:
      - postgres_password
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./secrets:/app-secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://api:8000/api/v1}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_SECRET_FILE:-./secrets/postgres_password.txt}
